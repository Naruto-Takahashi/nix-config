[tool.commitizen]
name = "cz_customize"

[tool.commitizen.customize]
message_template = "{{change_type}}{{scope}}: {{subject}}"
example = "✨ feat(nvim): add gitmoji plugin"
schema = "<gitmoji> <type>(<scope>): <subject>"
schema_pattern = ".+"

[[tool.commitizen.customize.questions]]
type = "list"
name = "change_type"
message = "変更の種類を選択してください:"
choices = [
  { value = "✨ feat", name = "✨ feat" },
  { value = "🐛 fix", name = "🐛 fix" },
  { value = "📝 docs", name = "📝 docs" },
  { value = "🎨 style", name = "🎨 style" },
  { value = "♻️ refactor", name = "♻️ refactor" },
  { value = "⚡️ perf", name = "⚡️ perf" },
  { value = "✅ test", name = "✅ test" },
  { value = "🔧 chore", name = "🔧 chore" },
  { value = "👷 ci", name = "👷 ci" },
  { value = "⏪️ revert", name = "⏪️ revert" },
  { value = "🚧 wip", name = "🚧 wip" },
  { value = "🔥 remove", name = "🔥 remove" },
  { value = "🔒️ security", name = "🔒️ security" },
  { value = "🔍️ debug", name = "🔍️ debug" },
]

[[tool.commitizen.customize.questions]]
type = "list"
name = "scope"
message = "スコープを選択してください(任意):"
choices = [
  { value = "", name = "(なし)" },
  { value = "(nvim)", name = "nvim" },
  { value = "(wezterm)", name = "wezterm" },
  { value = "(lazygit)", name = "lazygit" },
  { value = "(git-hooks)", name = "git-hooks" },
  { value = "(aerospace)", name = "aerospace" },
  { value = "(btop)", name = "btop" },
  { value = "(vivaldi)", name = "vivaldi" },
  { value = "(yazi)", name = "yazi" },
  { value = "(zsh)", name = "zsh" },
  { value = "(atuin)", name = "atuin" },
  { value = "(direnv)", name = "direnv" },
  { value = "(fastfetch)", name = "fastfetch" },
  { value = "(starship)", name = "starship" },
  { value = "(matugen)", name = "matugen" },
  { value = "(hyprland)", name = "hyprland" },
  { value = "(komorebi)", name = "komorebi" },
  { value = "(yasb)", name = "yasb" },
  { value = "(deps)", name = "deps" },
  { value = "(deps-dev)", name = "deps-dev" },
]

[[tool.commitizen.customize.questions]]
type = "input"
name = "subject"
message = "コミットの概要を入力してください:"
