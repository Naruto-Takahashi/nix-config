<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Custom styles. -->
    <link rel="stylesheet" type="text/css" href="./styles.css" />

    <!-- Add empty favicon to suppress not found errors. -->
    <link rel="icon" href="data:;" />

    <!-- Allows React to be run buildless via "text/babel" script below. -->
    <script
      src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"
      integrity="sha256-aS0B0wnsaDByLfE16h4MDCP1fQFccysd1YWOcV+gbBo="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      import React, { useState, useEffect } from "https://esm.sh/react@18?dev";
      import { createRoot } from "https://esm.sh/react-dom@18/client?dev";
      import * as zebar from "https://esm.sh/zebar@2";

            const providers = zebar.createProviderGroup({

              glazewm: { type: 'glazewm' },

              network: { type: "network" },

              cpu: { type: "cpu" },

              date: { type: "date", formatting: "EEE d MMM t" },

              battery: { type: "battery" },

              memory: { type: "memory" },

              keyboard: { type: "keyboard" },

            });

      

            createRoot(document.getElementById("root")).render(<App />);

      

            function App() {

              const [output, setOutput] = useState(providers.outputMap);

      

              useEffect(() => {

                providers.onOutput(() => setOutput(providers.outputMap));

              }, []);

      

              // Get icon to show for current network status.

              function getNetworkIcon(networkOutput) {

                switch (networkOutput.defaultInterface?.type) {

                  case "ethernet":

                    return <i className="nf nf-md-ethernet_cable"></i>;

                  case "wifi":

                    if (networkOutput.defaultGateway?.signalStrength >= 80) {

                      return <i className="nf nf-md-wifi_strength_4"></i>;

                    } else if (networkOutput.defaultGateway?.signalStrength >= 65) {

                      return <i className="nf nf-md-wifi_strength_3"></i>;

                    } else if (networkOutput.defaultGateway?.signalStrength >= 40) {

                      return <i className="nf nf-md-wifi_strength_2"></i>;

                    } else if (networkOutput.defaultGateway?.signalStrength >= 25) {

                      return <i className="nf nf-md-wifi_strength_1"></i>;

                    } else {

                      return <i className="nf nf-md-wifi_strength_outline"></i>;

                    }

                  default:

                    return <i className="nf nf-md-wifi_strength_off_outline"></i>;

                }

              }

      

              // Get icon to show for how much of the battery is charged.

              function getBatteryIcon(batteryOutput) {

                if (batteryOutput.chargePercent > 90)

                  return <i className="nf nf-fa-battery_4"></i>;

                if (batteryOutput.chargePercent > 70)

                  return <i className="nf nf-fa-battery_3"></i>;

                if (batteryOutput.chargePercent > 40)

                  return <i className="nf nf-fa-battery_2"></i>;

                if (batteryOutput.chargePercent > 20)

                  return <i className="nf nf-fa-battery_1"></i>;

                return <i className="nf nf-fa-battery_0"></i>;

              }

      

              function getNetworkClass(networkOutput) {
                if (networkOutput.defaultInterface?.type === 'wifi' && networkOutput.defaultGateway?.signalStrength) {
                  const strength = networkOutput.defaultGateway.signalStrength;
                  if (strength >= 60) return 'text-green';
                  if (strength >= 40) return 'text-yellow';
                  return 'text-red';
                }
                return '';
              }

              function getMemoryClass(memoryOutput) {
                if (memoryOutput.usage >= 80) return 'text-red';
                if (memoryOutput.usage >= 50) return 'text-yellow';
                return 'text-green';
              }

              function getCpuClass(cpuOutput) {
                if (cpuOutput.usage >= 80) return 'text-red';
                if (cpuOutput.usage >= 50) return 'text-yellow';
                return 'text-green';
              }

              function getBatteryClass(batteryOutput) {
                if (batteryOutput.chargePercent < 20 && !batteryOutput.isCharging) return 'text-red';
                if (batteryOutput.chargePercent < 50 && !batteryOutput.isCharging) return 'text-yellow';
                return 'text-green';
              }

              // Recursively collect all window containers from the workspace tree
              function getWindows(container) {
                if (!container) return [];
                if (container.type === 'window') return [container];
                return (container.children ?? []).flatMap(c => getWindows(c));
              }

        return (
          <div className="app">
            {/* ── Left island: workspaces + active window ── */}
            <div className="left">
              <i className="logo nf nf-fa-windows"></i>
              {output.glazewm && (
                <button
                  className="tiling-direction"
                  onClick={() => output.glazewm.runCommand('toggle-tiling-direction')}
                >
                  {output.glazewm.tilingDirection === 'horizontal' ? (
                    <i className="nf nf-md-swap_horizontal"></i>
                  ) : (
                    <i className="nf nf-md-swap_vertical"></i>
                  )}
                </button>
              )}
              {output.glazewm && (
                <div className="workspaces">
                  {output.glazewm.currentWorkspaces.map(workspace => (
                    <button
                      key={workspace.name}
                      className={`workspace ${workspace.hasFocus ? 'focused' : ''} ${workspace.isVisible ? 'displayed' : ''}`}
                      onClick={() => output.glazewm.runCommand(`focus --workspace ${workspace.name}`)}
                    >
                      {workspace.displayName ?? workspace.name}
                    </button>
                  ))}
                </div>
              )}
              {output.glazewm?.focusedWorkspace && (() => {
                const wins = getWindows(output.glazewm.focusedWorkspace);
                if (wins.length === 0) return null;
                return (
                  <div className="window-tabs">
                    {wins.map((win, i) => (
                      <span
                        key={i}
                        className={`window-tab${win.hasFocus ? ' focused' : ''}`}
                        title={win.title}
                      >
                        {win.title?.length > 22
                          ? win.title.slice(0, 21) + '…'
                          : win.title}
                      </span>
                    ))}
                  </div>
                );
              })()}
            </div>

            {/* ── Center island: date & time ── */}
            <div className="center">
              <i className="nf nf-fa-clock_o"></i>
              {output.date?.formatted}
            </div>

            {/* ── Right island: resource stats ── */}
            <div className="right">
              {output.network && (
                <div className={`network ${getNetworkClass(output.network)}`}>
                  {getNetworkIcon(output.network)}
                  {output.network.defaultGateway?.ssid}
                </div>
              )}
              {output.memory && (
                <div className={`memory ${getMemoryClass(output.memory)}`}>
                  <i className="nf nf-fae-chip"></i>
                  {Math.round(output.memory.usage)}%
                </div>
              )}
              {output.cpu && (
                <div className={`cpu ${getCpuClass(output.cpu)}`}>
                  <i className="nf nf-oct-cpu"></i>
                  {Math.round(output.cpu.usage)}%
                </div>
              )}
              {output.battery && (
                <div className={`battery ${getBatteryClass(output.battery)}`}>
                  {output.battery.isCharging && (
                    <i className="nf nf-md-power_plug charging-icon"></i>
                  )}
                  {getBatteryIcon(output.battery)}
                  {Math.round(output.battery.chargePercent)}%
                </div>
              )}
              <button
                className="tiling-direction"
                style={{ color: '#f38ba8' }}
                onClick={() => output.glazewm.runCommand('shell-exec shutdown /r /t 0')}
                title="Restart System"
              >
                <i className="nf nf-md-power"></i>
              </button>
            </div>
          </div>
        );
      }    </script>

  </body>
</html>
