# Starship performance optimizations for WSL
scan_timeout = 5000
command_timeout = 5000

palette = "matugen"

format = """
${custom.os_logo}\
$directory\
[](fg:accent bg:dark)\
$git_branch\
$git_status\
[](fg:dark)\
\n$character\
"""

right_format = """$cmd_duration$time"""

add_newline = true

[os]
disabled = true

[custom.os_logo]
command = """
if [ -n "$SSH_CONNECTION" ] || [ -n "$SSH_CLIENT" ]; then
  if [ -f /etc/os-release ]; then
    if grep -qi nixos /etc/os-release; then
      echo "⠀⠀"
    elif grep -qi ubuntu /etc/os-release; then
      echo "⠀⠀"
    elif grep -qi debian /etc/os-release; then
      echo "⠀⠀"
    elif grep -qi alpine /etc/os-release; then
      echo "⠀⠀"
    elif grep -qi arch /etc/os-release; then
      echo "⠀⠀"
    elif grep -qi fedora /etc/os-release; then
      echo "⠀⠀"
    elif grep -qi gentoo /etc/os-release; then
      echo "⠀⠀"
    else
      echo "⠀⠀"
    fi
  elif [ "$(uname)" = "Darwin" ]; then
    echo "⠀⠀"
  else
    echo "⠀⠀"
  fi
else
  # アイコン無し: 幅2のブロック (以前のちょうど良い幅)
  echo "⠀"
fi
"""
when = "true"
style = "fg:on_accent bg:secondary bold"
format = "[$output]($style)[](fg:secondary bg:accent)"

[username]
disabled = true

[hostname]
disabled = true

[fill]
symbol = ' '

[directory]
style = "fg:on_accent bg:accent bold"
truncation_length = 10
truncate_to_repo = false
truncation_symbol = "…/"
read_only = ' 󰌾 '
read_only_style = 'fg:on_accent bg:accent'
format = '[ $path ]($style)[$read_only]($read_only_style)'

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[aws]
disabled = true
[gcloud]
disabled = true

[git_branch]
symbol = ""
style = "bg:dark"
format = '[[ $symbol $branch ](fg:accent bg:dark)]($style)'

[git_status]
style = "bg:dark"
format = '[[($all_status$ahead_behind )](fg:accent bg:dark)]($style)'

[cmd_duration]
min_time = 1
style = 'fg:tertiary'
format = "[[  ](fg:muted) $duration]($style)"

[time]
disabled = false
time_format = "%R"
format = '[[  $time ](fg:muted)]($style)'

[character]
success_symbol = "[❯](bold secondary)"
error_symbol = "[❯](bold secondary)"
vicmd_symbol = "[❯](bold #8e8e8e)"

# フォールバック配色 (yasb-theme が壁紙から生成した色で差し替える)
# TOML の制約上、テーブル定義はトップレベルキーより後 (ファイル末尾) に置くこと
# MATUGEN:START
[palettes.matugen]
accent = "#ffc20d"
tertiary = "#b48ead"
secondary = "#d08770"
muted = "#a0a9cb"
dark = "#333333"
on_accent = "#000000"
# MATUGEN:END
