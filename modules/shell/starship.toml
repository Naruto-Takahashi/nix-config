# Starship performance optimizations for WSL
scan_timeout = 20
command_timeout = 500

palette = "matugen"

format = """
$directory\
[оӮ°](fg:accent bg:dark)\
$git_branch\
$git_status\
[оӮ°](fg:dark)\
\n$character\
"""

right_format = """$cmd_duration$username $time"""

add_newline = true

[username]
style_user = "white bold"
style_root = "black bold"
format = "user: [$user]($style) "
disabled = false

[fill]
symbol = ' '

[directory]
style = "fg:on_accent bg:accent bold"
truncation_length = 10
truncate_to_repo = false
truncation_symbol = "вҖҰ/"
read_only = ' у°Ңҫ '
read_only_style = 'fg:on_accent bg:accent'
format = '[ $path ]($style)[$read_only]($read_only_style)'

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[aws]
disabled = true
[gcloud]
disabled = true

[git_branch]
symbol = "пҗҳ"
style = "bg:dark"
format = '[[ $symbol $branch ](fg:accent bg:dark)]($style)'

[git_status]
style = "bg:dark"
format = '[[($all_status$ahead_behind )](fg:accent bg:dark)]($style)'

[cmd_duration]
min_time = 1
style = 'fg:accent_sub'
format = "[[ оӮі ](fg:muted) $duration]($style)"

[time]
disabled = false
time_format = "%R"
format = '[[ оӮі пҖ— $time ](fg:muted)]($style)'

[character]
success_symbol = "[вқҜ](bold accent)"
error_symbol = "[вқҜ](bold accent)"
vicmd_symbol = "[вқҜ](bold #8e8e8e)"

# гғ•гӮ©гғјгғ«гғҗгғғгӮҜй…ҚиүІ (yasb-theme гҒҢеЈҒзҙҷгҒӢгӮүз”ҹжҲҗгҒ—гҒҹиүІгҒ§е·®гҒ—жӣҝгҒҲгӮӢ)
# TOML гҒ®еҲ¶зҙ„дёҠгҖҒгғҶгғјгғ–гғ«е®ҡзҫ©гҒҜгғҲгғғгғ—гғ¬гғҷгғ«гӮӯгғјгӮҲгӮҠеҫҢ (гғ•гӮЎгӮӨгғ«жң«е°ҫ) гҒ«зҪ®гҒҸгҒ“гҒЁ
# MATUGEN:START
[palettes.matugen]
accent = "#ffc20d"
accent_sub = "#b48ead"
muted = "#a0a9cb"
dark = "#333333"
on_accent = "#000000"
# MATUGEN:END
