# atuin テーマ kanagawa-dragon フォールバック
# (matugen 未適用の環境向け。matugen-apply が同パスを上書きする。
#  配色キーの対応は templates/atuin-theme.toml と揃えること)
[theme]
name = "matugen"

[colors]
Base = "#c5c9c5"
Title = "#e6c384"
Important = "#f0dbb5"
Annotation = "#7aa89f"
# Guidance = 経過時間 (◯m ago) の列 (tertiary)
Guidance = "#7aa89f"
Muted = "#a6a69c"
# AlertInfo/AlertError = 実行時間列の成功/失敗色。zsh の
# syntax-highlighting (存在する/しないコマンド) と同じ固定値
AlertInfo = "#98bb6c"
AlertWarn = "#e6c384"
AlertError = "#e46876"
