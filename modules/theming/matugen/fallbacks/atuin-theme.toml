# atuin テーマ kanagawa-dragon フォールバック
# (matugen 未適用の環境向け。matugen-apply が同パスを上書きする。
#  配色キーの対応は templates/atuin-theme.toml と揃えること)
[theme]
name = "matugen"

[colors]
Base = "#c5c9c5"
Title = "#e6c384"
Important = "#f0dbb5"
Annotation = "#7aa89f"
# Guidance = 経過時間 (◯m ago) の列 (tertiary)
Guidance = "#7aa89f"
Muted = "#a6a69c"
# AlertInfo = 実行時間列の成功色 (zsh syntax-highlighting の緑と同じ固定値)
AlertInfo = "#98bb6c"
# AlertWarn = 選択行内の検索一致文字。フォールバック fzf の hl (#a292a3) と同色
AlertWarn = "#a292a3"
# AlertError = 「失敗した実行時間」と「選択行のコマンド」の共有スロット。
# 選択行の見やすさを優先して fzf ポインタと同系の accent
AlertError = "#e6c384"
