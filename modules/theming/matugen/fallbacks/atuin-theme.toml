# atuin テーマ kanagawa-dragon フォールバック
# (matugen 未適用の環境向け。matugen-apply が同パスを上書きする。
#  配色キーの対応は templates/atuin-theme.toml と揃えること)
[theme]
name = "matugen"

[colors]
Base = "#c5c9c5"
Title = "#e6c384"
# 選択行は atuin-separate-selection-color.patch により fzf と同じ
# 「背景 #303030 + Base 色の太字」で描画される (テーマ設定不要)
Important = "#e6c384"
Annotation = "#7aa89f"
# Guidance = 経過時間 (◯m ago) の列 (tertiary)
Guidance = "#7aa89f"
Muted = "#a6a69c"
# AlertInfo/AlertError = 実行時間列の成功/失敗色。zsh の
# syntax-highlighting (存在する/しないコマンド) と同じ固定値
AlertInfo = "#98bb6c"
AlertError = "#e46876"
# AlertWarn = 選択行内の検索一致文字。フォールバック fzf の hl (#a292a3) と同色
AlertWarn = "#a292a3"
