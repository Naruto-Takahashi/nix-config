# atuin テーマ (matugen-apply が @@KEY@@ を実際の配色に置換して
# ~/.config/atuin/themes/matugen.toml へ配置する)
[theme]
name = "matugen"

[colors]
Base = "@@TEXT@@"
Title = "@@ACCENT@@"
Important = "@@ACCENT_PALE@@"
Annotation = "@@TERTIARY@@"
# Guidance = 経過時間 (◯m ago) の列
Guidance = "@@TERTIARY@@"
Muted = "@@MUTED@@"
# AlertInfo/AlertError = 実行時間列の成功/失敗色。zsh の
# syntax-highlighting (存在する/しないコマンド) と同じ固定値に揃える
AlertInfo = "#98bb6c"
AlertWarn = "@@ACCENT@@"
AlertError = "#e46876"
