# atuin テーマ (matugen-apply が各プレースホルダを実際の配色に置換して
# ~/.config/atuin/themes/matugen.toml へ配置する)
[theme]
name = "matugen"

[colors]
# Baseにbg (fg/bgのtable形式) を設定してみたが、選択行だけでなく
# UI全体の配色が崩れる(白っぽく飛ぶ)ことが実機で確認されたため撤回。
# Baseはデフォルトの全体スタイルを兼ねているため、選択行専用の背景は
# atuinのテーマシステムでは安全に指定できないと判断し、fgのみに戻す。
Base = "@@TEXT@@"
# Title = 検索ボックス枠のタイトル ("GLOBAL" 等のフィルタ名) と枠線の色。
# フィルタモードに関わらず常にこのメインハイライト (accent) で固定する
Title = "@@ACCENT@@"
Important = "@@ACCENT@@"
Annotation = "@@TERTIARY@@"
# Guidance = 経過時間 (◯m ago) の列
Guidance = "@@TERTIARY@@"
Muted = "@@MUTED@@"
# AlertInfo/AlertError = 実行時間列の成功/失敗色。zsh の
# syntax-highlighting (存在する/しないコマンド) と同じ固定値
AlertInfo = "#98bb6c"
AlertError = "#e46876"
# AlertWarn = 選択行内の検索一致文字。fzf の hl (fzf-colors.sh) と同色
AlertWarn = "@@TERTIARY@@"
