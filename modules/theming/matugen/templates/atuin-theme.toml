# atuin テーマ (matugen-apply が @@KEY@@ を実際の配色に置換して
# ~/.config/atuin/themes/matugen.toml へ配置する)
[theme]
name = "matugen"

[colors]
Base = "@@TEXT@@"
# Title = 検索ボックス枠のフィルタモード "GLOBAL" 用色。fzf-style.patch の
# filter_mode_style() が Host/Session/Directory/Workspace には
# Annotation/Important/Guidance/Muted を流用する (nvim lualine.lua の
# モード別配色に倣う)
Title = "@@ACCENT@@"
# Session フィルタの枠色
Important = "@@SECONDARY@@"
# Host フィルタの枠色
Annotation = "@@TERTIARY@@"
# Directory フィルタの枠色
Guidance = "@@COMPLEMENT@@"
# Workspace フィルタの枠色 (通常の Muted 用途では未使用: fzf-style.patch 参照)
Muted = "@@TRIAD@@"
# AlertInfo/AlertError = 実行時間列の成功/失敗色。zsh の
# syntax-highlighting (存在する/しないコマンド) と同じ固定値
AlertInfo = "#98bb6c"
AlertError = "#e46876"
# AlertWarn = 選択行内の検索一致文字。fzf の hl (fzf-colors.sh) と同色
AlertWarn = "@@TERTIARY@@"
