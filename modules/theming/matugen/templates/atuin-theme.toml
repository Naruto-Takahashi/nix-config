# atuin テーマ (matugen-apply が @@KEY@@ を実際の配色に置換して
# ~/.config/atuin/themes/matugen.toml へ配置する)
[theme]
name = "matugen"

[colors]
Base = "@@TEXT@@"
Title = "@@ACCENT@@"
# 選択行は modules/patches/atuin-separate-selection-color.patch により
# fzf と同じ「背景 #303030 + Base 色の太字」で描画される (テーマ設定不要)
Important = "@@ACCENT@@"
Annotation = "@@TERTIARY@@"
# Guidance = 経過時間 (◯m ago) の列
Guidance = "@@TERTIARY@@"
Muted = "@@MUTED@@"
# AlertInfo/AlertError = 実行時間列の成功/失敗色。zsh の
# syntax-highlighting (存在する/しないコマンド) と同じ固定値
AlertInfo = "#98bb6c"
AlertError = "#e46876"
# AlertWarn = 選択行内の検索一致文字。fzf の hl (fzf-colors.sh) と同色
AlertWarn = "@@TERTIARY@@"
