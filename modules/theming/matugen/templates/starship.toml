# Starship performance optimizations for WSL
scan_timeout = 5000
command_timeout = 5000

palette = "matugen"

format = """
${custom.ssh_host}\
$directory\
[](fg:accent bg:dark)\
$git_branch\
$git_status\
[](fg:dark)\
\n$character\
"""

right_format = """$cmd_duration$time"""

add_newline = true

[os]
disabled = true

[custom.ssh_host]
command = """
if [ -n "$SSH_CONNECTION" ] || [ -n "$SSH_CLIENT" ]; then
  # directoryブロック等と同じ余白感に揃える。starshipのcustomモジュールは
  # 出力の前後の空白文字(スペース含む)をトリムしてしまうため、
  # 空白扱いされないbraille blank(⠀)でパディングする
  printf '⠀%s⠀' "$(hostname -s 2>/dev/null || hostname)"
else
  # アイコン無し: 幅2のブロック (以前のちょうど良い幅)
  echo "⠀"
fi
"""
when = "true"
style = "fg:on_accent bg:secondary bold"
format = "[$output]($style)[](fg:secondary bg:accent)"

[username]
disabled = true

[hostname]
disabled = true

[fill]
symbol = ' '

[directory]
style = "fg:on_accent bg:accent bold"
truncation_length = 10
truncate_to_repo = false
truncation_symbol = "…/"
read_only = ' 󰌾 '
read_only_style = 'fg:on_accent bg:accent'
format = '[ $path ]($style)[$read_only]($read_only_style)'

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[aws]
disabled = true
[gcloud]
disabled = true

[git_branch]
symbol = ""
style = "bg:dark"
format = '[[ $symbol $branch ](fg:accent bg:dark)]($style)'

[git_status]
style = "bg:dark"
format = '[[($all_status$ahead_behind )](fg:accent bg:dark)]($style)'
# deleted の既定 ✘ (U+2718 HEAVY BALLOT X) はフォントによって隣のシンボルと
# 重なって見えることがあったため、ASCII文字のハイフンに変更
# (diffの削除行と同じ記号で直感的、幅計算のブレによる崩れも起きない)
deleted = "-"

[cmd_duration]
min_time = 1
style = 'fg:tertiary'
format = "[[  ](fg:muted) $duration]($style)"

[time]
disabled = false
time_format = "%R"
format = '[[  $time ](fg:muted)]($style)'

[character]
success_symbol = "[❯](bold secondary)"
error_symbol = "[❯](bold secondary)"
vicmd_symbol = "[❯](bold #8e8e8e)"

# このブロックは matugen ネイティブではなく、colors.lua 生成後に
# modules/theming/matugen/lib/render-template.sh が埋める
# (accent_pale は色相回転同様、matugen単体では計算できないため)。
[palettes.matugen]
accent = "@@ACCENT@@"
accent_pale = "@@ACCENT_PALE@@"
tertiary = "@@TERTIARY@@"
secondary = "@@SECONDARY@@"
muted = "@@MUTED@@"
dark = "@@SURFACE@@"
on_accent = "@@ON_ACCENT@@"
