# Generated by modules/theming/matugen (matugen palette post-processing) — do not edit
[tool.commitizen]
name = "cz_customize"
style = [
  ["qmark", "fg:@@ACCENT@@ bold"],
  ["question", "bold"],
  ["answer", "fg:@@ACCENT@@ bold"],
  ["pointer", "fg:@@ACCENT@@ bold"],
  ["highlighted", "fg:@@ACCENT@@ bold"],
  ["selected", "fg:@@TERTIARY@@"],
  ["separator", "fg:@@SECONDARY@@"],
  ["instruction", ""],
  ["text", ""],
  ["disabled", "fg:@@MUTED@@ italic"],
]

[tool.commitizen.customize]
# scope が deps/deps-dev のときは prepare-commit-msg フックと同じ規約で
# ⬆️/⬇️ に上書きする (Renovate/Dependabot慣例、cz commit経由でも
# 手書きコミットと同じ挙動にするため)。
message_template = "{% if scope in ['deps', 'deps-dev'] %}{% if 'downgrade' in subject.lower() %}⬇️{% else %}⬆️{% endif %} {{change_type.split(' ', 1)[1]}}{% else %}{{change_type}}{% endif %}{% if scope %}({{scope}}){% endif %}: {{subject}}"
example = "✨ feat(nvim): add gitmoji plugin"
schema = "<gitmoji> <type>(<scope>): <subject>"
schema_pattern = ".+"

[[tool.commitizen.customize.questions]]
type = "list"
name = "change_type"
message = "Select the type of change:"
choices = [
  { value = "✨ feat", name = "✨ feat" },
  { value = "🐛 fix", name = "🐛 fix" },
  { value = "📝 docs", name = "📝 docs" },
  { value = "🎨 style", name = "🎨 style" },
  { value = "♻️ refactor", name = "♻️ refactor" },
  { value = "⚡️ perf", name = "⚡️ perf" },
  { value = "✅ test", name = "✅ test" },
  { value = "🔧 chore", name = "🔧 chore" },
  { value = "📦️ build", name = "📦️ build" },
  { value = "👷 ci", name = "👷 ci" },
  { value = "⏪️ revert", name = "⏪️ revert" },
  { value = "🚧 wip", name = "🚧 wip" },
  { value = "🔥 remove", name = "🔥 remove" },
  { value = "🔒️ security", name = "🔒️ security" },
  { value = "🎉 init", name = "🎉 init" },
  { value = "🔍️ debug", name = "🔍️ debug" },
  { value = "🔀 merge", name = "🔀 merge" },
]

# scopeはリポジトリごとに意味が変わるため自由入力にする
# (どのリポジトリでも同じ設定を使い回せるように、固定リストにしない)
[[tool.commitizen.customize.questions]]
type = "input"
name = "scope"
message = "Scope (optional, e.g. nvim / deps):"

[[tool.commitizen.customize.questions]]
type = "input"
name = "subject"
message = "Subject:"
