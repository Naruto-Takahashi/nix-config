# Generated by modules/theming/matugen (matugen palette post-processing) — do not edit
[tool.commitizen]
name = "cz_customize"
style = [
  ["qmark", "fg:@@ACCENT@@ bold"],
  ["question", "bold"],
  ["answer", "fg:@@ACCENT@@ bold"],
  ["pointer", "fg:@@ACCENT@@ bold"],
  ["highlighted", "fg:@@ACCENT@@ bold"],
  ["selected", "fg:@@TERTIARY@@"],
  ["separator", "fg:@@SECONDARY@@"],
  ["instruction", ""],
  ["text", ""],
  ["disabled", "fg:@@MUTED@@ italic"],
]

[tool.commitizen.customize]
# scope が deps/deps-dev のときは prepare-commit-msg フックと同じ規約で
# ⬆️/⬇️ に上書きする (Renovate/Dependabot慣例、cz commit経由でも
# 手書きコミットと同じ挙動にするため)。
message_template = "{% if scope in ['deps', 'deps-dev'] %}{% if 'downgrade' in subject.lower() %}⬇️{% else %}⬆️{% endif %} {{change_type.split(' ', 1)[1]}}{% else %}{{change_type}}{% endif %}{% if scope %}({{scope}}){% endif %}: {{subject}}"
example = "✨ feat(nvim): add gitmoji plugin"
schema = "<gitmoji> <type>(<scope>): <subject>"
schema_pattern = ".+"

[[tool.commitizen.customize.questions]]
type = "list"
name = "change_type"
message = "Select the type of change:"
# modules/apps/git-hooks/cz.toml と modules/apps/git-hooks/hooks/prepare-commit-msg
# の MAP を手動で同じ内容に保つこと (typeを追加/変更したら3箇所とも直す)。
choices = [
  { value = "✨ feat", name = "✨ feat     - new feature" },
  { value = "🐛 fix", name = "🐛 fix      - bug fix" },
  { value = "📝 docs", name = "📝 docs     - documentation only" },
  { value = "🎨 style", name = "🎨 style    - formatting, no logic change" },
  { value = "♻️ refactor", name = "♻️ refactor - code change, no feat/fix" },
  { value = "⚡️ perf", name = "⚡️ perf     - performance improvement" },
  { value = "✅ test", name = "✅ test     - add/update tests" },
  { value = "🔧 chore", name = "🔧 chore    - misc/config, no src change" },
  { value = "📦️ build", name = "📦️ build    - build system/dependencies" },
  { value = "👷 ci", name = "👷 ci       - CI config" },
  { value = "⏪️ revert", name = "⏪️ revert   - revert a previous commit" },
  { value = "🚧 wip", name = "🚧 wip      - work in progress" },
  { value = "🔥 remove", name = "🔥 remove   - delete code/files" },
  { value = "🔒️ security", name = "🔒️ security - security fix" },
  { value = "🎉 init", name = "🎉 init     - initial commit" },
  { value = "🔍️ debug", name = "🔍️ debug    - debug/logging" },
  { value = "🔀 merge", name = "🔀 merge    - merge branches" },
]

# scopeはリポジトリごとに意味が変わるため自由入力にする
# (どのリポジトリでも同じ設定を使い回せるように、固定リストにしない)
[[tool.commitizen.customize.questions]]
type = "input"
name = "scope"
message = "Scope (optional, e.g. nvim / deps):"

[[tool.commitizen.customize.questions]]
type = "input"
name = "subject"
message = "Subject:"
