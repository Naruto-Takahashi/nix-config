# ==============================================================================
# 全般設定 (General Settings)
# ==============================================================================
general:
  # NOTE: ZebarはWindowsのStartupフォルダから起動するため，ここでは起動コマンドを空にしている．
  startup_commands: []

  # カーソルの下にあるウィンドウに自動でフォーカスを合わせるか
  focus_follows_cursor: true

  # 現在フォーカスされているワークスペースを再選択した際，直前のワークスペースとトグルするか
  toggle_workspace_on_refocus: false

  # 特定のアクション時にカーソルをウィンドウ中央へ自動移動させる設定
  cursor_jump:
    enabled: true
    # window_focus: フォーカスが他ウィンドウに移った際にジャンプ
    trigger: "window_focus"

# ==============================================================================
# ギャップ設定 (Gaps)
# ==============================================================================
gaps:
  # 隣り合うウィンドウ間の隙間
  inner_gap: "6px"

  # ウィンドウと画面端の間の隙間
  # NOTE: Zebarの 'dockToEdge' 機能が自動でスペースを確保するため，top gapは2pxにリセットしている．
  outer_gap:
    top: "2px"
    right: "6px"
    bottom: "6px"
    left: "6px"

# ==============================================================================
# ウィンドウ・エフェクト設定 (Window Effects)
# ==============================================================================
window_effects:
  # フォーカスされているウィンドウの見た目（Windows 11専用）
  focused_window:
    border:
      enabled: true
      color: "#ffc20d" # ゴールド（テーマカラー）

  # フォーカスされていないウィンドウの見た目
  other_windows:
    border:
      enabled: true
      color: "#a1a1a1"

# ==============================================================================
# ウィンドウの初期動作設定 (Window Behavior)
# ==============================================================================
window_behavior:
  # 新規ウィンドウ起動時の初期状態（'tiling' または 'floating'）
  initial_state: "tiling"

  # 各ウィンドウ状態のデフォルトオプション
  state_defaults:
    floating:
      centered: true        # 初期配置で中央寄せにするか
      shown_on_top: false   # 常に最前面に表示するか
    fullscreen:
      maximized: false      # 最大化を優先するか（最大化非対応時はフルスクリーン化）
      shown_on_top: false   # 常に最前面に表示するか

# ==============================================================================
# ワークスペース設定 (Workspaces)
# ==============================================================================
workspaces:
  # TODO: ワークスペースごとの専用レイアウトや初期アプリ配置ルールの見直し（例: 開発，ブラウジング等の割り当て）
  - name: "1"
  - name: "2"
  - name: "3"
  - name: "4"
  - name: "5"
  - name: "6"
  - name: "7"
  - name: "8"
  - name: "9"

# ==============================================================================
# ウィンドウ・ルール設定 (Window Rules)
# ==============================================================================
window_rules:
  # 起動時だけタイリングから除外（フローティング）して崩れを防ぐ
  - commands: ["set-floating", "wm-redraw"]
    match:
      - window_title: {regex: ".*[Gg][Tt][Kk][Ww][Aa][Vv][Ee].*"}

  # タイル配置から除外（フローティング化または無視）するアプリの設定
  - commands: ["ignore"]
    match:
      # Zebarのバー本体をタイル対象外にする
      - window_process: {equals: "zebar"}

      # ブラウザのピクチャー・イン・ピクチャー
      - window_title: {regex: "[Pp]icture.in.[Pp]icture"}
        window_class: {regex: "Chrome_WidgetWin_1|MozillaDialogClass"}

      # PowerToys等のWindowsユーティリティ
      - window_process: {equals: "PowerToys.PowerAccent"}
      - window_process: {equals: "PowerToys.Run"}

      # Lively Wallpaper等
      - window_process: {equals: "Lively"}
        window_class: {regex: "HwndWrapper*"}

  # 全てのウィンドウに対してデフォルトでタイリングと再描画を設定
  - commands: ["toggle-tiling-direction", "set-tiling", "wm-redraw"]
    match:
      - window_process: {regex: ".*"}
# ==============================================================================
# 特殊バインディングモード設定 (Binding Modes)
# ==============================================================================
binding_modes:
  # リサイズモード：矢印キーまたはHJKLでサイズ調整可能にする
  - name: "resize"
    keybindings:
      - commands: ["resize --width -2%"]
        bindings: ["h", "left"]
      - commands: ["resize --width +2%"]
        bindings: ["l", "right"]
      - commands: ["resize --height +2%"]
        bindings: ["k", "up"]
      - commands: ["resize --height -2%"]
        bindings: ["j", "down"]
      # EscapeまたはEnterでリサイズモードを終了
      - commands: ["wm-disable-binding-mode --name resize"]
        bindings: ["escape", "enter"]

  # 一時停止モード：alt+shift+p を除くすべてのショートカットを無効化する
  - name: "pause"
    keybindings:
      - commands: ["wm-disable-binding-mode --name pause"]
        bindings: ["alt+shift+p"]

# ==============================================================================
# キーバインド設定 (Keybindings)
# ==============================================================================
keybindings:
  # ウィンドウ間のフォーカス移動（Vimキーバインド）
  - commands: ["focus --direction left"]
    bindings: ["alt+h"]
  - commands: ["focus --direction right"]
    bindings: ["alt+l"]
  - commands: ["focus --direction up"]
    bindings: ["alt+k"]
  - commands: ["focus --direction down"]
    bindings: ["alt+j"]

  # フォーカスされているウィンドウの配置移動
  - commands: ["move --direction left"]
    bindings: ["alt+shift+h", "alt+shift+left"]
  - commands: ["move --direction right"]
    bindings: ["alt+shift+l", "alt+shift+right"]
  - commands: ["move --direction up"]
    bindings: ["alt+shift+k", "alt+shift+up"]
  - commands: ["move --direction down"]
    bindings: ["alt+shift+j", "alt+shift+down"]

  # ウィンドウサイズの簡易微調整
  - commands: ["resize --width -2%"]
    bindings: ["alt+u"]
  - commands: ["resize --width +2%"]
    bindings: ["alt+p"]
  - commands: ["resize --height +2%"]
    bindings: ["alt+o"]
  - commands: ["resize --height -2%"]
    bindings: ["alt+i"]

  # バインディングモードの切り替え
  - commands: ["wm-enable-binding-mode --name resize"]
    bindings: ["alt+r"]
  - commands: ["wm-enable-binding-mode --name pause"]
    bindings: ["alt+shift+p"]

  # ウィンドウ分割方向のトグル
  - commands: ["toggle-tiling-direction"]
    bindings: ["alt+v"]

  # ウィンドウ表示状態のトグル
  # NOTE: alt+space はランチャー（Everything等）用に予約．ここでは alt+shift+space のみ割り当て．
  - commands: ["toggle-floating --centered"]
    bindings: ["alt+shift+space"]

  # フローティング↔タイリングをトグルする．
  - commands: ["toggle-tiling"]
    bindings: ["alt+t"]

  # フルスクリーン表示の切り替え
  - commands: ["toggle-fullscreen"]
    bindings: ["alt+f"]

  # ウィンドウの最小化
  - commands: ["toggle-minimized"]
    bindings: ["alt+m"]

  # ウィンドウを閉じる
  - commands: ["close"]
    bindings: ["alt+shift+q"]

  # GlazeWMの安全な終了
  - commands: ["wm-exit"]
    bindings: ["alt+shift+e"]

  # 設定ファイルの再読み込み
  - commands: ["wm-reload-config"]
    bindings: ["alt+shift+r"]

  # 画面の再描画
  - commands: ["wm-redraw"]
    bindings: ["alt+shift+w"]

  # ワークスペース間のフォーカス移動
  - commands: ["focus --next-workspace"]
    bindings: ["alt+s"]
  - commands: ["focus --prev-workspace"]
    bindings: ["alt+a"]
  - commands: ["focus --recent-workspace"]
    bindings: ["alt+d"]

  # 特定ワークスペースへのダイレクトジャンプ
  - commands: ["focus --workspace 1"]
    bindings: ["alt+1"]
  - commands: ["focus --workspace 2"]
    bindings: ["alt+2"]
  - commands: ["focus --workspace 3"]
    bindings: ["alt+3"]
  - commands: ["focus --workspace 4"]
    bindings: ["alt+4"]
  - commands: ["focus --workspace 5"]
    bindings: ["alt+5"]
  - commands: ["focus --workspace 6"]
    bindings: ["alt+6"]
  - commands: ["focus --workspace 7"]
    bindings: ["alt+7"]
  - commands: ["focus --workspace 8"]
    bindings: ["alt+8"]
  - commands: ["focus --workspace 9"]
    bindings: ["alt+9"]

  # ワークスペース全体のモニター間移動（マルチモニター環境用）
  - commands: ["move-workspace --direction left"]
    bindings: ["alt+shift+a"]
  - commands: ["move-workspace --direction right"]
    bindings: ["alt+shift+f"]
  - commands: ["move-workspace --direction up"]
    bindings: ["alt+shift+d"]
  - commands: ["move-workspace --direction down"]
    bindings: ["alt+shift+s"]

  # フォーカスウィンドウを別ワークスペースへ移動し，フォーカスも追従させる
  - commands: ["move --workspace 1", "focus --workspace 1"]
    bindings: ["alt+shift+1"]
  - commands: ["move --workspace 2", "focus --workspace 2"]
    bindings: ["alt+shift+2"]
  - commands: ["move --workspace 3", "focus --workspace 3"]
    bindings: ["alt+shift+3"]
  - commands: ["move --workspace 4", "focus --workspace 4"]
    bindings: ["alt+shift+4"]
  - commands: ["move --workspace 5", "focus --workspace 5"]
    bindings: ["alt+shift+5"]
  - commands: ["move --workspace 6", "focus --workspace 6"]
    bindings: ["alt+shift+6"]
  - commands: ["move --workspace 7", "focus --workspace 7"]
    bindings: ["alt+shift+7"]
  - commands: ["move --workspace 8", "focus --workspace 8"]
    bindings: ["alt+shift+8"]
  - commands: ["move --workspace 9", "focus --workspace 9"]
    bindings: ["alt+shift+9"]
