<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="./styles.css" />
    <link rel="icon" href="data:;" />
  </head>
  <body>
    <div id="root" style="color:white; font-family:monospace; padding:10px;">Loading status bar...</div>

    <script>
      // 画面が真っ白な場合にエラーを画面上に表示するための救急処置
      window.onerror = function(msg, url, line, col, error) {
        var el = document.getElementById('root');
        if (el) {
          el.innerHTML = '<div style="color:#f38ba8; background:rgba(0,0,0,0.8); padding:10px; border:1px solid #f38ba8; border-radius:5px;">' +
            '<strong>Runtime Error:</strong><br>' + msg + '<br>' +
            '<small>at ' + url + ':' + line + ':' + col + '</small>' +
            '</div>';
        }
        return false;
      };
    </script>

    <script type="importmap">
      {
        "imports": {
          "preact": "./lib/preact.js",
          "preact/hooks": "./lib/hooks.js",
          "htm": "./lib/htm.js",
          "zebar": "./lib/zebar.js"
        }
      }
    </script>

    <script type="module">
      import { h, render } from "preact";
      import { useState, useEffect } from "preact/hooks";
      import htm from "htm";
      import * as zebar from "zebar";

      const html = htm.bind(h);

      const providers = zebar.createProviderGroup({
        glazewm: { type: 'glazewm' },
        network: { type: "network" },
        cpu: { type: "cpu" },
        date: { type: "date", formatting: "EEE d MMM ' | ' t" },
        battery: { type: "battery" },
        memory: { type: "memory" },
        keyboard: { type: "keyboard" },
      });

      function App() {
        const [output, setOutput] = useState(providers.outputMap);

        useEffect(() => {
          providers.onOutput(() => setOutput(providers.outputMap));
        }, []);

        const getNetworkIcon = (networkOutput) => {
          switch (networkOutput.defaultInterface?.type) {
            case "ethernet": return html`<i class="nf nf-md-ethernet_cable"></i>`;
            case "wifi":
              const signal = networkOutput.defaultGateway?.signalStrength;
              if (signal >= 80) return html`<i class="nf nf-md-wifi_strength_4"></i>`;
              if (signal >= 65) return html`<i class="nf nf-md-wifi_strength_3"></i>`;
              if (signal >= 40) return html`<i class="nf nf-md-wifi_strength_2"></i>`;
              if (signal >= 25) return html`<i class="nf nf-md-wifi_strength_1"></i>`;
              return html`<i class="nf nf-md-wifi_strength_outline"></i>`;
            default: return html`<i class="nf nf-md-wifi_strength_off_outline"></i>`;
          }
        };

        const getBatteryIcon = (batteryOutput) => {
          const percent = batteryOutput.chargePercent;
          if (percent > 90) return html`<i class="nf nf-fa-battery_4"></i>`;
          if (percent > 70) return html`<i class="nf nf-fa-battery_3"></i>`;
          if (percent > 40) return html`<i class="nf nf-fa-battery_2"></i>`;
          if (percent > 20) return html`<i class="nf nf-fa-battery_1"></i>`;
          return html`<i class="nf nf-fa-battery_0"></i>`;
        };

        const getWindows = (container) => {
          if (!container) return [];
          if (container.type === 'window') return [container];
          return (container.children ?? []).flatMap(c => getWindows(c));
        };

        const formatWindowTitle = (win) => {
          if (!win.title) {
            if (!win.processName) return "Window";
            if (win.processName.toLowerCase() === "wezterm-gui") return "WezTerm";
            if (win.processName.toLowerCase() === "code") return "VS Code";
            return win.processName.charAt(0).toUpperCase() + win.processName.slice(1);
          }
          let t = win.title;
          const suffixes = [' - Vivaldi', ' - Google Chrome', ' - Microsoft\u200b Edge', ' - Visual Studio Code', ' - Discord', ' - WezTerm'];
          for (const suffix of suffixes) {
            if (t.endsWith(suffix)) { t = t.slice(0, -suffix.length); break; }
          }
          const cliMatch = t.match(/^(Yazi|nvim|zsh|bash|fish|tmux|btop|htop|vim|lazygit):/i);
          if (cliMatch) return cliMatch[1].charAt(0).toUpperCase() + cliMatch[1].slice(1);
          return t.replace(/:\s*nalt\b.*/i, '');
        };

        return html`
          <div class="app">
            <div class="left-group">
              ${output.glazewm && html`
                <div class="island" style=${{ background: '#66a366' }}>
                  <i class="logo nf nf-fa-windows" style=${{ color: '#000000', marginRight: '4px', opacity: 0.8 }}></i>
                  <button
                    class="tiling-direction"
                    onClick=${() => output.glazewm.runCommand('toggle-tiling-direction')}
                    style=${{ background: 'transparent', color: '#000000', padding: 0 }}
                  >
                    ${output.glazewm.tilingDirection === 'horizontal' 
                      ? html`<i class="nf nf-md-swap_horizontal" style=${{ color: '#000000' }}></i>`
                      : html`<i class="nf nf-md-swap_vertical" style=${{ color: '#000000' }}></i>`
                    }
                  </button>
                </div>
              `}

              <div class="island">
                ${output.glazewm && html`
                  <div class="workspaces">
                    ${output.glazewm.currentWorkspaces.map(workspace => html`
                      <button
                        key=${workspace.name}
                        class=${`workspace ${workspace.hasFocus ? 'focused' : ''} ${workspace.isVisible ? 'displayed' : ''}`}
                        onClick=${() => output.glazewm.runCommand(`focus --workspace ${workspace.name}`)}
                      >
                        ${workspace.displayName ?? workspace.name}
                      </button>
                    `)}
                  </div>
                `}
              </div>

              ${output.glazewm?.displayedWorkspace && getWindows(output.glazewm.displayedWorkspace).map((win, i) => html`
                <div 
                  key=${i} 
                  class="island"
                  style=${win.hasFocus ? { background: '#ffd147', color: '#000000' } : {}}
                >
                  <span
                    class="window-tab"
                    title=${win.title || win.processName}
                    style=${{ 
                      padding: 0, 
                      margin: 0, 
                      color: win.hasFocus ? '#000000' : undefined,
                      fontWeight: win.hasFocus ? 600 : 'normal'
                    }}
                  >
                    ${(() => {
                      const displayTitle = formatWindowTitle(win);
                      return displayTitle.length > 22 ? displayTitle.slice(0, 21) + '…' : displayTitle;
                    })()}
                  </span>
                </div>
              `)}
            </div>

            <div class="center-group">
              <div class="island center" style=${{ background: '#cba6f7', color: '#000000' }}>
                ${output.date?.formatted}
              </div>
            </div>

            <div class="right-group">
              <div class="island">
                ${output.network && html`
                  <div class=${`network ${output.network.defaultInterface?.type === 'wifi' && output.network.defaultGateway?.signalStrength < 40 ? 'text-red' : ''}`}>
                    ${getNetworkIcon(output.network)}
                    <span class="resource-text">${output.network.defaultGateway?.ssid}</span>
                  </div>
                `}
                ${output.network && (output.memory || output.cpu) && html`<span class="sep">|</span>`}
                ${output.memory && html`
                  <div class=${`memory ${output.memory.usage >= 80 ? 'text-red' : output.memory.usage >= 50 ? 'text-yellow' : 'text-green'}`}>
                    <i class="nf nf-fae-chip"></i>
                    <span class="resource-text">${Math.round(output.memory.usage)}%</span>
                  </div>
                `}
                ${output.memory && output.cpu && html`<span class="sep">|</span>`}
                ${output.cpu && html`
                  <div class=${`cpu ${output.cpu.usage >= 80 ? 'text-red' : output.cpu.usage >= 50 ? 'text-yellow' : 'text-green'}`}>
                    <i class="nf nf-oct-cpu"></i>
                    <span class="resource-text">${Math.round(output.cpu.usage)}%</span>
                  </div>
                `}
              </div>
              
              ${output.battery && html`
                <div class=${`island battery ${output.battery.chargePercent < 20 ? 'text-red' : ''}`}>
                  ${output.battery.isCharging && html`<i class="nf nf-md-power_plug charging-icon"></i>`}
                  ${getBatteryIcon(output.battery)}
                  <span class="resource-text">${Math.round(output.battery.chargePercent)}%</span>
                </div>
              `}
              
              <div class="island" style=${{ background: '#ffd147' }}>
                <button
                  class="tiling-direction"
                  onClick=${() => output.glazewm.runCommand('shell-exec rundll32.exe user32.dll,LockWorkStation')}
                  title="Lock System"
                >
                  <i class="nf nf-fa-lock" style=${{ color: '#000000' }}></i>
                </button>
              </div>
              <div class="island" style=${{ background: '#b87d7d' }}>
                <button
                  class="tiling-direction"
                  onClick=${() => output.glazewm.runCommand('shell-exec shutdown /r /t 0')}
                  title="Restart System"
                >
                  <i class="nf nf-md-power" style=${{ color: '#000000' }}></i>
                </button>
              </div>
            </div>
          </div>
        `;
      }

      try {
        render(html`<${App} />`, document.getElementById("root"));
      } catch (e) {
        alert("Mount Error: " + e);
      }
    </script>
  </body>
</html>
