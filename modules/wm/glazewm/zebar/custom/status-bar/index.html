<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="./styles.css" />
    <link rel="icon" href="data:;" />
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      // Import from separate entries to ensure correct export discovery
      import { h, render } from "https://esm.sh/preact@10.22.0";
      import { useState, useEffect } from "https://esm.sh/preact@10.22.0/hooks";
      import htm from "https://esm.sh/htm@3.1.1";
      import * as zebar from "https://esm.sh/zebar@2.7.0";

      const html = htm.bind(h);

      const providers = zebar.createProviderGroup({
        glazewm: { type: 'glazewm' },
        network: { type: "network" },
        cpu: { type: "cpu" },
        audio: { type: "audio" },
        date: { type: "date", formatting: "EEE d MMM ' | ' t" },
        battery: { type: "battery" },
        memory: { type: "memory" },
        keyboard: { type: "keyboard" },
      });

      function App() {
        const [output, setOutput] = useState(providers.outputMap);
        const [restartClicks, setRestartClicks] = useState(0);

        useEffect(() => {
          providers.onOutput(() => setOutput(providers.outputMap));
        }, []);

        const getNetworkIcon = (networkOutput) => {
          if (!networkOutput) return '';
          switch (networkOutput.defaultInterface?.type) {
            case "ethernet": return html`<i className="nf nf-md-ethernet_cable"></i>`;
            case "wifi":
              const signal = networkOutput.defaultGateway?.signalStrength;
              if (signal >= 80) return html`<i className="nf nf-md-wifi_strength_4"></i>`;
              if (signal >= 65) return html`<i className="nf nf-md-wifi_strength_3"></i>`;
              if (signal >= 40) return html`<i className="nf nf-md-wifi_strength_2"></i>`;
              if (signal >= 25) return html`<i className="nf nf-md-wifi_strength_1"></i>`;
              return html`<i className="nf nf-md-wifi_strength_outline"></i>`;
            default: return html`<i className="nf nf-md-wifi_strength_off_outline"></i>`;
          }
        };

        const getBatteryIcon = (batteryOutput) => {
          if (!batteryOutput) return '';
          const percent = batteryOutput.chargePercent;
          if (percent > 90) return html`<i className="nf nf-fa-battery_4"></i>`;
          if (percent > 70) return html`<i className="nf nf-fa-battery_3"></i>`;
          if (percent > 40) return html`<i className="nf nf-fa-battery_2"></i>`;
          if (percent > 20) return html`<i className="nf nf-fa-battery_1"></i>`;
          return html`<i className="nf nf-fa-battery_0"></i>`;
        };

        const getAudioIcon = (audioOutput) => {
          if (!audioOutput || !audioOutput.defaultPlaybackDevice) return html`<i className="nf nf-fa-volume_off"></i>`;
          if (audioOutput.defaultPlaybackDevice.isMuted) return html`<i className="nf nf-fa-volume_off"></i>`;
          const volume = audioOutput.defaultPlaybackDevice.volume;
          if (volume >= 60) return html`<i className="nf nf-fa-volume_up"></i>`;
          if (volume >= 20) return html`<i className="nf nf-fa-volume_down"></i>`;
          return html`<i className="nf nf-fa-volume_off"></i>`;
        };

        const getWindows = (container) => {
          if (!container) return [];
          if (container.type === 'window') return [container];
          return (container.children ?? []).flatMap(c => getWindows(c));
        };

        const formatWindowTitle = (win) => {
          if (!win.title) {
            if (!win.processName) return "Window";
            if (win.processName.toLowerCase() === "wezterm-gui") return "WezTerm";
            if (win.processName.toLowerCase() === "code") return "VS Code";
            return win.processName.charAt(0).toUpperCase() + win.processName.slice(1);
          }
          let t = win.title;
          const suffixes = [' - Vivaldi', ' - Google Chrome', ' - Microsoft\u200b Edge', ' - Visual Studio Code', ' - Discord', ' - WezTerm'];
          for (const suffix of suffixes) {
            if (t.endsWith(suffix)) { t = t.slice(0, -suffix.length); break; }
          }
          const cliMatch = t.match(/^(Yazi|nvim|zsh|bash|fish|tmux|btop|htop|vim|lazygit):/i);
          if (cliMatch) return cliMatch[1].charAt(0).toUpperCase() + cliMatch[1].slice(1);
          t = t.replace(/:\s*nalt\b.*/i, '');
          return t;
        };

        const getNetworkClass = (networkOutput) => {
          if (networkOutput.defaultInterface?.type === 'wifi' && networkOutput.defaultGateway?.signalStrength) {
            const strength = networkOutput.defaultGateway.signalStrength;
            if (strength >= 60) return 'text-green';
            if (strength >= 40) return 'text-yellow';
            return 'text-red';
          }
          return '';
        };

        const getMemoryClass = (m) => m && m.usage >= 80 ? 'text-red' : m && m.usage >= 50 ? 'text-yellow' : 'text-green';
        const getCpuClass = (c) => c && c.usage >= 80 ? 'text-red' : c && c.usage >= 50 ? 'text-yellow' : 'text-green';
        const getBatteryClass = (b) => b && b.chargePercent < 20 && !b.isCharging ? 'text-red' : b && b.chargePercent < 50 && !b.isCharging ? 'text-yellow' : 'text-green';
        const getAudioClass = (a) => !a || !a.defaultPlaybackDevice || a.defaultPlaybackDevice.isMuted ? 'text-red' : 'text-green';

        return html`
          <div className="app">
            <div className="left-group">
              ${output.glazewm && html`
                <div className="island" style=${{ background: '#66a366' }}>
                  <button
                    className="tiling-direction"
                    onClick=${() => output.glazewm.runCommand('toggle-tiling-direction')}
                    style=${{ background: 'transparent', color: '#000000', padding: 0 }}
                  >
                    ${output.glazewm.tilingDirection === 'horizontal' 
                      ? html`<i className="nf nf-md-swap_horizontal" style=${{ color: '#000000' }}></i>`
                      : html`<i className="nf nf-md-swap_vertical" style=${{ color: '#000000' }}></i>`
                    }
                  </button>
                </div>
              `}

              <div className="island">
                ${output.glazewm && html`
                  <div className="workspaces">
                    ${output.glazewm.currentWorkspaces.map(workspace => html`
                      <button
                        key=${workspace.name}
                        className=${`workspace ${workspace.hasFocus ? 'focused' : ''} ${workspace.isVisible ? 'displayed' : ''}`}
                        onClick=${() => output.glazewm.runCommand(`focus --workspace ${workspace.name}`)}
                      >
                        ${workspace.displayName ?? workspace.name}
                      </button>
                    `)}
                  </div>
                `}
              </div>

              ${output.glazewm?.displayedWorkspace && (() => {
                const wins = getWindows(output.glazewm.displayedWorkspace);
                if (wins.length === 0) return null;
                return html`
                  <div className="island window-tabs-container" style=${{ padding: '0 4px' }}>
                    ${wins.map((win, i) => html`
                      <div 
                        key=${i} 
                        style=${{ 
                          display: 'flex', 
                          alignItems: 'center', 
                          background: win.hasFocus ? '#ffd147' : 'transparent', 
                          borderRadius: '4px', 
                          padding: '1px 6px',
                          margin: '0 1px'
                        }}
                      >
                        <span
                          className="window-tab"
                          title=${win.title || win.processName}
                          style=${{ color: win.hasFocus ? '#000000' : undefined, fontWeight: win.hasFocus ? 600 : 'normal' }}
                        >
                          ${(() => {
                            const displayTitle = formatWindowTitle(win);
                            return displayTitle.length > 22 ? displayTitle.slice(0, 21) + '…' : displayTitle;
                          })()}
                        </span>
                      </div>
                      ${i < wins.length - 1 ? html`<span className="sep">|</span>` : ''}
                    `)}
                  </div>
                `;
              })()}
            </div>

            <div className="center-group">
              <div className="island center" style=${{ background: '#cba6f7', color: '#000000' }}>
                ${output.date?.formatted}
              </div>
            </div>

            <div className="right-group">
              <div className="island">
                ${output.network && html`
                  <div className=${`network ${getNetworkClass(output.network)}`}>
                    ${getNetworkIcon(output.network)}
                    <span className="resource-text">${output.network.defaultGateway?.ssid}</span>
                  </div>
                `}
                ${(output.memory || output.cpu) && html`<span className="sep">|</span>`}
                ${output.memory && html`
                  <div className=${`memory ${getMemoryClass(output.memory)}`}>
                    <i className="nf nf-fae-chip"></i>
                    <span className="resource-text">${Math.round(output.memory.usage)}%</span>
                  </div>
                `}
                ${output.cpu && html`<span className="sep">|</span>`}
                ${output.cpu && html`
                  <div className=${`cpu ${getCpuClass(output.cpu)}`}>
                    <i className="nf nf-oct-cpu"></i>
                    <span className="resource-text">${Math.round(output.cpu.usage)}%</span>
                  </div>
                `}
              </div>
              
              <div className="island">
                ${output.audio && html`
                  <div 
                    className=${`audio ${getAudioClass(output.audio)}`}
                    style=${{ cursor: 'pointer' }}
                    onClick=${() => output.glazewm.runCommand('shell-exec wscript.exe C:\\Users\\tnaru\\.glzr\\zebar\\custom\\status-bar\\toggle_mute.vbs')}
                    title="Toggle Mute"
                  >
                    ${getAudioIcon(output.audio)}
                    <span className="resource-text">${output.audio.defaultPlaybackDevice ? Math.round(output.audio.defaultPlaybackDevice.volume) : 0}%</span>
                  </div>
                `}

                ${output.audio && output.battery && html`<span className="sep">|</span>`}

                ${output.battery && html`
                  <div className=${`battery ${getBatteryClass(output.battery)}`}>
                    ${output.battery.isCharging && html`<i className="nf nf-md-power_plug charging-icon"></i>`}
                    ${getBatteryIcon(output.battery)}
                    <span className="resource-text">${Math.round(output.battery.chargePercent)}%</span>
                  </div>
                `}
              </div>
              
              <div className="island" style=${{ background: '#ffd147' }}>
                <button
                  className="tiling-direction"
                  onClick=${() => output.glazewm.runCommand('shell-exec rundll32.exe user32.dll,LockWorkStation')}
                  title="Lock System"
                >
                  <i className="nf nf-fa-lock" style=${{ color: '#000000' }}></i>
                </button>
              </div>
              <div className="island" style=${{ background: restartClicks > 0 ? '#ff8888' : '#b87d7d' }}>
                <button
                  className="tiling-direction"
                  onClick=${() => {
                    if (restartClicks === 0) {
                      setRestartClicks(1);
                      setTimeout(() => setRestartClicks(0), 3000);
                    } else {
                      output.glazewm.runCommand('shell-exec shutdown /r /t 0');
                    }
                  }}
                  title=${restartClicks === 0 ? "Restart System" : "Click again to confirm"}
                >
                  <i className=${restartClicks === 0 ? "nf nf-md-power" : "nf nf-fa-warning"} style=${{ color: '#000000' }}></i>
                  ${restartClicks > 0 ? html`<span style=${{color: '#000', fontSize: '10px', marginLeft: '4px', fontWeight: 'bold'}}>Sure?</span>` : ''}
                </button>
              </div>
            </div>
          </div>
        `;
      }

      render(html`<${App} />`, document.getElementById("root"));
    </script>
  </body>
</html>
