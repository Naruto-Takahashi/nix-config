watch_config: true
bars:
  main_bar:
    enabled: true
    screens: ["*"]
    class_name: "yasb-bar"
    alignment:
      position: "top"
      center: false
    dimensions:
      width: "100%"
      height: 30
    widgets:
      left: ["komorebi_workspaces"]
      center: ["clock"]
      right: ["cpu", "memory", "battery"]

widgets:
  komorebi_workspaces:
    type: "yasb.komorebi.WorkspacesWidget"
    options:
      label_offline: "K"
      label_workspace_btn: "{index}"
      label_workspace_active_btn: "{index}"
      label_workspace_empty_btn: "{index}"
  clock:
    type: "yasb.clock.ClockWidget"
    options:
      format: "%a %d %b | %H:%M:%S"
  cpu:
    type: "yasb.cpu.CpuWidget"
  memory:
    type: "yasb.memory.MemoryWidget"
  battery:
    type: "yasb.battery.BatteryWidget"
