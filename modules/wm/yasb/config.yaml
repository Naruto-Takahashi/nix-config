watch_stylesheet: true
watch_config: true
debug: false
komorebi:
  start_command: "komorebic start"
  stop_command: "komorebic stop"
  reload_command: "komorebic stop && komorebic start"
bars:
  primary-bar:
    enabled: true
    screens: ['\\.\DISPLAY1']
    class_name: "yasb-bar"
    alignment:
      position: "top"
      center: false
    blur_effect:
      enabled: true
      dark_mode: false
      round_corners: true
      round_corners_type: "normal"
      border_color: None
    window_flags:
      always_on_top: true
      windows_app_bar: true
      hide_on_fullscreen: true
    dimensions:
      width: "100%"
      height: 34
    padding:
      top: 2
      left: 8
      bottom: 0
      right: 8
    widgets:
      left:
        [
          "komorebi_workspaces",
          "taskbar",
        ]
      center:
        ["clock"]
      right:
        [
          "cava",
          "media",
          "volume",
          "cpu",
          "memory",
          "wifi",
          "battery",
          "wallpapers",
          "power_menu"
        ]
  secondary-bar:
    enabled: true
    screens: ['Mi Monitor']
    class_name: "yasb-bar"
    alignment:
      position: "top"
      center: false
    blur_effect:
      enabled: true
      dark_mode: false
      round_corners: true
      round_corners_type: "normal"
      border_color: None
    window_flags:
      always_on_top: true
      windows_app_bar: true
      hide_on_fullscreen: true
    dimensions:
      width: "100%"
      height: 34
    padding:
      top: 2
      left: 8
      bottom: 0
      right: 8
    widgets:
      left:
        [
          "komorebi_workspaces",
          "taskbar",
        ]
      center:
        ["clock"]
      right:
        [
          "cava",
          "media",
          "volume",
          "cpu",
          "memory",
          "wifi",
          "battery",
          "wallpapers",
          "power_menu"
        ]
widgets:
  komorebi_workspaces:
    type: "komorebi.workspaces.WorkspaceWidget"
    options:
        label_offline: "⚡ Offline"
        label_workspace_btn: ""
        # アクティブなワークスペースだけ通し番号 (komorebi.json の name) を表示
        label_workspace_active_btn: "{name}"
        label_workspace_populated_btn: ""
        label_default_name: "{index}"
        label_zero_index: false
        hide_empty_workspaces: false
        hide_if_offline: true
  media:
      type: "yasb.media.MediaWidget"
      options:
        label: "{title}"
        label_alt: "{artist}"
        max_field_size:
          label: 15
          label_alt: 15
        scrolling_label:
          enabled: true
          style: "left"  # 電光掲示板風に左へ流す
          update_interval_ms: 33
          separator: "  |  "
        show_thumbnail: false
        controls_only: false
        controls_left: true
        hide_empty: true
        thumbnail_alpha: 250
        thumbnail_padding: 8
        thumbnail_corner_radius: 0
        icons:
          prev_track: ""
          next_track: ""
          play: "<span></span>"
          pause: "<span></span>"
  taskbar:
    type: "yasb.taskbar.TaskbarWidget"
    options:
      icon_size: 16
      tooltip: true
      show_only_visible: true
      strict_filtering: true
      monitor_exclusive: true
      animation:
        enabled: true
      preview:
        enabled: true
        width: 240
        delay: 400
        padding: 8
        margin: 8
      title_label:
        enabled: true
        show: "always"
        min_length: 8
        max_length: 16
      ignore_apps:
        processes: []
        titles: []
        classes: []
  volume:
    type: "yasb.volume.VolumeWidget"
    options:
      label: "<span>{icon}</span> {level}"
      label_alt: "{volume}"
      volume_icons:
        - ""  # Icon for muted
        - ""  # Icon for 0-10% volume
        - ""  # Icon for 11-30% volume
        - ""  # Icon for 31-60% volume
        - ""  # Icon for 61-100% volume
      callbacks:
        on_right: "exec cmd.exe /c start ms-settings:sound"
  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "{%a %b %d %H:%M}"
      label_alt: "{%A, %d %B %Y %H:%M}"
      timezones: []
      calendar:
        alignment: "center"
  cpu:
    type: "yasb.cpu.CpuWidget"
    options:
      label: "<span></span> {info[percent][total]}%"
      label_alt: "<span></span> {info[percent][total]}% {info[freq][current]:.1f}GHz"
      update_interval: 2000
      callbacks:
        on_left: "toggle_label"
  memory:
    type: "yasb.memory.MemoryWidget"
    options:
      label: "<span></span> {virtual_mem_percent}%"
      label_alt: "<span></span> {virtual_mem_used}/{virtual_mem_total}"
      update_interval: 5000
      memory_thresholds:
        low: 25
        medium: 50
        high: 90
      callbacks:
        on_left: "toggle_label"
  wifi:
    type: "yasb.wifi.WifiWidget"
    options:
      label: "<span>{wifi_icon}</span> {wifi_name}"
      label_alt: "<span>{wifi_icon}</span> {wifi_name} {wifi_strength}%"
      update_interval: 5000
      wifi_icons:
        - "󰤮"  # disconnected
        - "󰤟"  # weak
        - "󰤢"  # medium
        - "󰤥"  # strong
        - "󰤨"  # very strong
      callbacks:
        on_left: "toggle_label"
        on_right: "exec cmd.exe /c start ms-settings:network-wifi"
  battery:
    type: "yasb.battery.BatteryWidget"
    options:
      label: "<span>{icon}</span> {percent}%"
      label_alt: "<span>{icon}</span> {percent}% {time_remaining}"
      update_interval: 30000
      charging_options:
        icon_format: "{charging_icon}"
      callbacks:
        on_left: "toggle_label"
  wallpapers:
    type: "yasb.wallpapers.WallpapersWidget"
    options:
      label: "<span>󰸉</span>"
      image_path: "C:\\Users\\tnaru\\Pictures\\wallpapers"
      change_automatically: false
      update_interval: 60
      gallery:
        enabled: true
        blur: true
        image_width: 220
        image_per_page: 5
        show_buttons: true
        orientation: "landscape"
        image_spacing: 8
        lazy_load: true
        lazy_load_delay: 10
        lazy_load_fadein: 200
        image_corner_radius: 20
        enable_cache: true
      run_after:
        # 壁紙変更をトリガーに WSL 側の matugen で配色を再生成する
        - "wsl.exe -e /home/nalt/.local/bin/matugen-apply \"{image}\""
  power_menu:
      type: "yasb.power_menu.PowerMenuWidget"
      options:
        label: ""
        uptime: True
        blur: False
        blur_background: True
        animation_duration: 250 # Milisecond
        button_row: 5 # Number of buttons in row, min 1 max 5
        buttons:
          signout: ["󰍃","Sign out"]
          shutdown: ["","Shut Down"]
          restart: ["","Restart"]
          hibernate: ["","Hibernate"]
          cancel: ["󰜺","Cancel"]
  cava:
    type: "yasb.cava.CavaWidget"
    options:
      bar_height: 12
      gradient: 1
      reverse: 0
      sensitivity: 100
      foreground: "#d7bde4"
      gradient_color_1: '#d7bde4'
      gradient_color_2: '#d7bde4'
      gradient_color_3: '#a2c9fd'
      bars_number: 8
      bar_spacing: 2
      bar_width: 4
      sleep_timer: 0
      hide_empty: true
