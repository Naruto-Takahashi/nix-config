watch_config: true
bars:
  main_bar:
    enabled: true
    screens: ["*"]
    class_name: "yasb-bar"
    alignment:
      position: "top"
      center: false
    dimensions:
      width: "100%"
      height: 30
    widgets:
      left: ["komorebi_workspaces"]
      center: ["active_window"]
      right: ["cpu", "memory", "battery", "clock"]

widgets:
  komorebi_workspaces:
    type: "komorebi.workspaces.WorkspaceWidget"
    options:
      label_offline: "K"
      label_workspace_btn: "{index}"
      label_workspace_active_btn: "{index}"
  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "{%a %d %b | %H:%M:%S}"
  cpu:
    type: "yasb.cpu.CpuWidget"
    options:
      label: "CPU: {info[histograms][cpu_percent]}%"
  memory:
    type: "yasb.memory.MemoryWidget"
    options:
      label: "RAM: {virtual_mem_percent}%"
  battery:
    type: "yasb.battery.BatteryWidget"
    options:
      label: "BAT: {percent}%"
  active_window:
    type: "yasb.active_window.ActiveWindowWidget"
    options:
      label: "{win[title]}"
      max_length: 50
