watch_config: true
bars:
  main_bar:
    enabled: true
    screens: ["primary"]
    class_name: "yasb-bar"
    alignment:
      position: "top"
      center: true
    dimensions:
      width: "100%"
      height: 30
    window_flags:
      windows_app_bar: true
      always_on_top: false
    widgets:
      left: ["komorebi_workspaces", "taskbar"]
      center: ["clock"]
      right: ["cpu", "memory", "battery"]
  sub_bar:
    enabled: true
    screens: ["non-primary"]
    class_name: "yasb-bar"
    alignment:
      position: "top"
      center: true
    dimensions:
      width: "100%"
      height: 30
    window_flags:
      windows_app_bar: true
      always_on_top: false
    widgets:
      left: ["komorebi_workspaces", "taskbar"]
      center: ["clock"]
      right: ["cpu", "memory", "battery"]

widgets:
  komorebi_workspaces:
    type: "komorebi.workspaces.WorkspaceWidget"
    options:
      label_offline: ""
      label_workspace_btn: "{index}"
      label_workspace_active_btn: "{index}"
      label_workspace_populated_btn: "{index}"
      label_default_name: "{index}"
      label_zero_index: false
      hide_empty_workspaces: true
      hide_if_offline: true
  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "{%a %d %b | %H:%M:%S}"
  cpu:
    type: "yasb.cpu.CpuWidget"
    options:
      label: "CPU: {info[percent][total]:.0f}%"
      update_interval: 2000
  memory:
    type: "yasb.memory.MemoryWidget"
    options:
      label: "RAM: {virtual_mem_percent}%"
      update_interval: 5000
  battery:
    type: "yasb.battery.BatteryWidget"
    options:
      label: "BAT: {percent}%"
      update_interval: 5000
  taskbar:
    type: "yasb.taskbar.TaskbarWidget"
    options:
      show_only_visible: true
      strict_filtering: true
      icon_size: 14
      title_label:
        enabled: true
        show: "always"
        max_length: 15
