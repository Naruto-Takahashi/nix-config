watch_config: true
bars:
  main_bar:
    enabled: true
    screens: ["*"]
    class_name: "yasb-bar"
    alignment:
      top: true
      left: true
      right: true
    height: 26
    widgets:
      left: ["komorebi_workspaces"]
      center: ["clock"]
      right: ["cpu", "memory", "battery"]

widgets:
  komorebi_workspaces:
    type: "komorebi_workspaces"
    options:
      label_offline: "K"
      label_workspace: "{index}"
      label_workspace_active: "{index}"
      label_workspace_empty: "{index}"
  clock:
    type: "clock"
    options:
      label: "{%a %d %b | %H:%M:%S}"
  cpu:
    type: "cpu"
  memory:
    type: "memory"
  battery:
    type: "battery"
