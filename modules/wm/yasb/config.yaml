      left: 8
      bottom: 0
      right: 8
    widgets:
      left:
        [
          "komorebi_workspaces_main",
          "taskbar",
        ]
      center:
        ["clock"]
      right:
        [
          "cava",
          "media",
          "volume",
          "cpu",
          "memory",
          "wifi",
          "battery",
          "wallpapers",
          "power_menu"
        ]
