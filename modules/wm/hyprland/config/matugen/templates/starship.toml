# Starship performance optimizations for WSL
scan_timeout = 20
command_timeout = 500

palette = "matugen"

format = """
$username$hostname\
$directory\
[Óāį](fg:accent bg:dark)\
$git_branch\
$git_status\
[Óāį](fg:dark)\
\n$character\
"""

right_format = """$cmd_duration$time"""

add_newline = true

[username]
show_always = false
style_user = "fg:on_accent bg:accent_sub bold"
style_root = "fg:red bg:accent_sub bold"
format = "[ $user]($style)"
disabled = false

[hostname]
ssh_only = true
style = "fg:on_accent bg:accent_sub bold"
format = "[@$hostname ]($style)[Óāį](fg:accent_sub bg:accent)"
disabled = false

[fill]
symbol = ' '

[directory]
style = "fg:on_accent bg:accent bold"
truncation_length = 10
truncate_to_repo = false
truncation_symbol = "‚Ä¶/"
read_only = ' ůįĆĺ '
read_only_style = 'fg:on_accent bg:accent'
format = '[ $path ]($style)[$read_only]($read_only_style)'

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "

[aws]
disabled = true
[gcloud]
disabled = true

[git_branch]
symbol = "Ôźė"
style = "bg:dark"
format = '[[ $symbol $branch ](fg:accent bg:dark)]($style)'

[git_status]
style = "bg:dark"
format = '[[($all_status$ahead_behind )](fg:accent bg:dark)]($style)'

[cmd_duration]
min_time = 1
style = 'fg:accent_sub'
format = "[[ Óā≥ ](fg:muted) $duration]($style)"

[time]
disabled = false
time_format = "%R"
format = '[[ Óā≥ $time ](fg:muted)]($style)'

[character]
success_symbol = "[‚ĚĮ](bold accent_sub)"
error_symbol = "[‚ĚĮ](bold accent_sub)"
vicmd_symbol = "[‚ĚĮ](bold #8e8e8e)"

# MATUGEN:START
[palettes.matugen]
accent = "{{colors.primary.default.hex}}"
accent_sub = "{{colors.tertiary.default.hex}}"
secondary = "{{colors.secondary.default.hex}}"
muted = "{{colors.on_surface_variant.default.hex}}"
dark = "{{colors.surface_container_high.default.hex}}"
on_accent = "{{colors.surface.default.hex}}"
# MATUGEN:END
