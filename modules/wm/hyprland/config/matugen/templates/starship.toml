# Starship performance optimizations for WSL
scan_timeout = 5000
command_timeout = 5000

palette = "matugen"

format = """
${custom.os_logo}\
$directory\
[оӮ°](fg:accent bg:dark)\
$git_branch\
$git_status\
[оӮ°](fg:dark)\
\n$character\
"""

right_format = """$cmd_duration$time"""

add_newline = true

[os]
disabled = true

[custom.os_logo]
command = """
if [ -n "$SSH_CONNECTION" ] || [ -n "$SSH_CLIENT" ]; then
  if [ -f /etc/os-release ]; then
    if grep -qi nixos /etc/os-release; then
      echo "в ҖпҢ“в Җ"
    elif grep -qi ubuntu /etc/os-release; then
      echo "в ҖпҢӣв Җ"
    elif grep -qi debian /etc/os-release; then
      echo "в ҖпҢҶв Җ"
    elif grep -qi alpine /etc/os-release; then
      echo "в ҖпҢҖв Җ"
    elif grep -qi arch /etc/os-release; then
      echo "в ҖпҢғв Җ"
    elif grep -qi fedora /etc/os-release; then
      echo "в ҖпҢҠв Җ"
    elif grep -qi gentoo /etc/os-release; then
      echo "в ҖпҢҚв Җ"
    else
      echo "в Җп…јв Җ"
    fi
  elif [ "$(uname)" = "Darwin" ]; then
    echo "в Җп…№в Җ"
  else
    echo "в Җп…јв Җ"
  fi
else
  # гӮўгӮӨгӮігғіз„ЎгҒ—: е№…2гҒ®гғ–гғӯгғғгӮҜ (д»ҘеүҚгҒ®гҒЎгӮҮгҒҶгҒ©иүҜгҒ„е№…)
  echo "в Җв Җ"
fi
"""
when = "true"
style = "fg:on_accent bg:secondary bold"
format = "[$output]($style)[оӮ°](fg:secondary bg:accent)"

[username]
disabled = true

[hostname]
disabled = true

[fill]
symbol = ' '

[directory]
style = "fg:on_accent bg:accent bold"
truncation_length = 10
truncate_to_repo = false
truncation_symbol = "вҖҰ/"
read_only = ' у°Ңҫ '
read_only_style = 'fg:on_accent bg:accent'
format = '[ $path ]($style)[$read_only]($read_only_style)'

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[aws]
disabled = true
[gcloud]
disabled = true

[git_branch]
symbol = "пҗҳ"
style = "bg:dark"
format = '[[ $symbol $branch ](fg:accent bg:dark)]($style)'

[git_status]
style = "bg:dark"
format = '[[($all_status$ahead_behind )](fg:accent bg:dark)]($style)'

[cmd_duration]
min_time = 1
style = 'fg:tertiary'
format = "[[ оӮі ](fg:muted) $duration]($style)"

[time]
disabled = false
time_format = "%R"
format = '[[ оӮі $time ](fg:muted)]($style)'

[character]
success_symbol = "[вқҜ](bold secondary)"
error_symbol = "[вқҜ](bold secondary)"
vicmd_symbol = "[вқҜ](bold #8e8e8e)"

# MATUGEN:START
[palettes.matugen]
accent = "{{colors.primary.default.hex}}"
tertiary = "{{colors.tertiary.default.hex}}"
secondary = "{{colors.secondary.default.hex}}"
muted = "{{colors.on_surface_variant.default.hex}}"
dark = "{{colors.surface_container_high.default.hex}}"
on_accent = "{{colors.surface.default.hex}}"
# MATUGEN:END
