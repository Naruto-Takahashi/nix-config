Ubuntu = "ŅĮå "
Windows = "Ņś¬ "
WSL = "ŅĮå "

[username]
disabled = true

[hostname]
disabled = true

[fill]
symbol = ' '

[directory]
style = "fg:on_accent bg:accent bold"
truncation_length = 10
truncate_to_repo = false
truncation_symbol = "ŌĆ”/"
read_only = ' ¾░īŠ '
read_only_style = 'fg:on_accent bg:accent'
format = '[ $path ]($style)[$read_only]($read_only_style)'

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "’Ćü "
"Pictures" = "’ĆŠ "

[aws]
disabled = true
[gcloud]
disabled = true

[git_branch]
symbol = "’Éś"
style = "bg:dark"
format = '[[ $symbol $branch ](fg:accent bg:dark)]($style)'

[git_status]
style = "bg:dark"
format = '[[($all_status$ahead_behind )](fg:accent bg:dark)]($style)'

[cmd_duration]
min_time = 1
style = 'fg:accent_sub'
format = "[[ Ņé│ ](fg:muted) $duration]($style)"

[time]
disabled = false
time_format = "%R"
format = '[[ Ņé│ $time ](fg:muted)]($style)'

[character]
success_symbol = "[ŌØ»](bold accent_sub)"
error_symbol = "[ŌØ»](bold accent_sub)"
vicmd_symbol = "[ŌØ»](bold #8e8e8e)"

# MATUGEN:START
[palettes.matugen]
accent = "{{colors.primary.default.hex}}"
accent_sub = "{{colors.tertiary.default.hex}}"
secondary = "{{colors.secondary.default.hex}}"
muted = "{{colors.on_surface_variant.default.hex}}"
dark = "{{colors.surface_container_high.default.hex}}"
on_accent = "{{colors.surface.default.hex}}"
