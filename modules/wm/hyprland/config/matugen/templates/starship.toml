# Starship performance optimizations for WSL
scan_timeout = 5000
command_timeout = 5000

palette = "matugen"

format = """
${custom.os_logo}\
$directory\
[](fg:accent bg:dark)\
$git_branch\
$git_status\
[](fg:dark)\
\n$character\
"""

right_format = """$cmd_duration$time"""

add_newline = true

[os]
disabled = true

[custom.os_logo]
command = """
if [ -n "$SSH_CONNECTION" ] || [ -n "$SSH_CLIENT" ]; then
  if [ -f /etc/os-release ]; then
    # ID_LIKE 等の部分一致(例: RockyのID_LIKEにfedoraを含む)による誤判定を避けるため、
    # ID= 行だけを見て判定する。一致しないディストリは汎用Linuxアイコンにフォールバック。
    os_id=$(. /etc/os-release 2>/dev/null && echo "$ID")
    case "$os_id" in
      nixos)  echo "⠀⠀" ;;
      ubuntu) echo "⠀⠀" ;;
      debian) echo "⠀⠀" ;;
      alpine) echo "⠀⠀" ;;
      arch)   echo "⠀⠀" ;;
      fedora) echo "⠀⠀" ;;
      gentoo) echo "⠀⠀" ;;
      *)      echo "⠀⠀" ;;
    esac
  elif [ "$(uname)" = "Darwin" ]; then
    echo "⠀⠀"
  else
    echo "⠀⠀"
  fi
else
  # アイコン無し: 幅2のブロック (以前のちょうど良い幅)
  echo "⠀"
fi
"""
when = "true"
style = "fg:on_accent bg:secondary bold"
format = "[$output]($style)[](fg:secondary bg:accent)"

[username]
disabled = true

[hostname]
disabled = true

[fill]
symbol = ' '

[directory]
style = "fg:on_accent bg:accent bold"
truncation_length = 10
truncate_to_repo = false
truncation_symbol = "…/"
read_only = ' 󰌾 '
read_only_style = 'fg:on_accent bg:accent'
format = '[ $path ]($style)[$read_only]($read_only_style)'

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[aws]
disabled = true
[gcloud]
disabled = true

[git_branch]
symbol = ""
style = "bg:dark"
format = '[[ $symbol $branch ](fg:accent bg:dark)]($style)'

[git_status]
style = "bg:dark"
format = '[[($all_status$ahead_behind )](fg:accent bg:dark)]($style)'

[cmd_duration]
min_time = 1
style = 'fg:tertiary'
format = "[[  ](fg:muted) $duration]($style)"

[time]
disabled = false
time_format = "%R"
format = '[[  $time ](fg:muted)]($style)'

[character]
success_symbol = "[❯](bold secondary)"
error_symbol = "[❯](bold secondary)"
vicmd_symbol = "[❯](bold #8e8e8e)"

# MATUGEN:START
[palettes.matugen]
accent = "{{colors.primary.default.hex}}"
accent_pale = "{{colors.primary_container.default.hex}}"
tertiary = "{{colors.tertiary.default.hex}}"
secondary = "{{colors.secondary.default.hex}}"
muted = "{{colors.on_surface_variant.default.hex}}"
dark = "{{colors.surface_container_high.default.hex}}"
on_accent = "{{colors.surface.default.hex}}"
# MATUGEN:END
