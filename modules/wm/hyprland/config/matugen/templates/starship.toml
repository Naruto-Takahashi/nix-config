Debian = "’īå "
Fedora = "’īŖ "
FreeBSD = "’īī "
Gentoo = "’īŹ "
Linux = "’ģ╝ "
Macos = "’ģ╣ "
NixOS = "’īō "
OpenSUSE = "’īö "
OracleLinux = "¾░åÜ "
Redhat = "’ī¢ "
RedHatedit = "’ī¢ "
RockyLinux = "’ī½ "
