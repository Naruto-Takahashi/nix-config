# Starship performance optimizations for WSL
scan_timeout = 20
command_timeout = 500

palette = "matugen"

format = """
$os\
$directory\
[Ņé░](fg:accent bg:dark)\
$git_branch\
$git_status\
[Ņé░](fg:dark)\
\n$character\
"""

right_format = """$cmd_duration$time"""

add_newline = true

[os]
disabled = false
style = "fg:on_accent bg:accent_sub bold"
format = "[ $symbol]($style)[Ņé░](fg:accent_sub bg:accent)"

[os.symbols]
Alpinelinux = "’īĆ "
