[config.wallpaper]
command = "awww img --transition-type any --transition-fps 60 {{image}}"
set = true


[templates.waybar]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.cache/matugen/colors.css'
post_hook = 'pkill -SIGUSR2 waybar'

[templates.kitty]
input_path = '~/.config/matugen/templates/kitty-colors.conf'
output_path = '~/.cache/matugen/kitty-colors.conf'
post_hook = "kill -SIGUSR1 $(pidof kitty)"

[templates.hyprland]
input_path = '~/.config/matugen/templates/hyprland-colors.conf'
output_path = '~/.cache/matugen/colors.conf'
post_hook = 'hyprctl reload'

[templates.gtk3]
input_path = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-3.0/colors.css'

[templates.gtk4]
input_path = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-4.0/colors.css'

[templates.rofi]
input_path = '~/.config/matugen/templates/rofi-colors.rasi'
output_path = '~/.cache/matugen/colors.rasi'

[templates.cava]
input_path = '~/.config/matugen/templates/matugen-cava'
output_path = '~/.config/cava/config'
post_hook = "pkill -USR1 cava"

[templates.spicetify]
input_path = '~/.config/matugen/templates/spotify-colors.ini'
output_path = '~/.config/spicetify/Themes/text/color.ini'

[templates.vesktop]
input_path = '~/.config/matugen/templates/midnight-discord.css'
output_path = '~/.config/vesktop/themes/matugen.css'

[templates.neovim_yazi]
input_path = '~/.config/matugen/templates/colors.lua'
output_path = '~/.cache/matugen/colors.lua'

# starship / wezterm / lazygit / yazi theme.toml は、色相回転
# (complement/triad/accent_pale) を含む値が必要で matugen 単体では
# 出力できないため、colors.lua 生成後に wppicker.sh が
# modules/theming/matugen/lib/ の共通スクリプトで後処理する。
# テンプレート本体:
#   - modules/theming/matugen/templates/starship.toml
#     (palettes.matugen ブロックのみ @@プレースホルダ@@、他は静的)
#   - wezterm は colors.lua をそのまま ~/.config/wezterm/matugen-colors.lua
#     へコピーするだけ (別テンプレート不要)
#   - modules/theming/matugen/templates/lazygit-theme.yml
#     (gui.themeの配色のみ。customCommands等は modules/apps/lazygit/default.nix
#     の ~/.config/lazygit/config.yml が単一ソースで、LG_CONFIG_FILEの
#     カンマ区切りマージで重ねる)
#   - modules/apps/yazi/theme-template.toml

[templates.fzf]
input_path = '~/.config/matugen/templates/fzf-colors.sh'
output_path = '~/.cache/matugen/fzf-colors.sh'

