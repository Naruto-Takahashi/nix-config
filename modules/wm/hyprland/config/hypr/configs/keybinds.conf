###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier (which Kanata maps Alt to)

# Core Operations (aligned with GlazeWM & Kanata)
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, RETURN, exec, [float; size 800 550] $terminal 
bind = $mainMod SHIFT, Q, killactive, # Alt+q maps to Super+Shift+q via Kanata

# System Control
bind = CTRL ALT, Delete, exec, hyprctl dispatch exit 0 # exit Hyprland
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, $menu # Alt+d/Alt+Space maps to Super+d via Kanata
bind = $mainMod, V, layoutmsg, togglesplit, # Alt+v maps to Super+v via Kanata

# Window States
bind = $mainMod, T, togglefloating, # Alt+t maps to Super+t via Kanata (toggles tiling/floating)
bind = $mainMod SHIFT, Space, togglefloating, # Alt+Shift+Space maps to Super+Shift+Space
bind = $mainMod, F, fullscreen, 0 # Alt+f maps to Super+f via Kanata

# Workspace Focus (a / s / grv)
bind = $mainMod, A, workspace, m-1 # Alt+a maps to Super+a (Previous workspace)
bind = $mainMod, S, workspace, m+1 # Alt+s maps to Super+s (Next workspace)
bind = $mainMod, grv, workspace, previous # Alt+` maps to Super+` (Recent workspace)

# Focus movement (HJKL)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move active window (Shift + HJKL)
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Resize windows (u / i / o / p)
binde = $mainMod, U, resizeactive, -50 0
binde = $mainMod, P, resizeactive, 50 0
binde = $mainMod, O, resizeactive, 0 50
binde = $mainMod, I, resizeactive, 0 -50

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Helper Scripts & Controls
bind = $mainMod, R, exec, ~/.config/hypr/scripts/wbrestart.sh
bind = $mainMod, B, exec, vivaldi # default browser
bind = $mainMod ALT, L, exec, ~/.config/hypr/scripts/hyprlock.sh # Lock screen (moved from Super+L to Super+Alt+L)
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wppicker.sh
bind = $mainMod, C, exec, hyprpicker -a
bind = $mainMod CTRL, B, exec, ~/.config/hypr/scripts/WaybarStyles.sh # Waybar Styles Menu
bind = $mainMod ALT, B, exec, ~/.config/hypr/scripts/WaybarLayout.sh # Waybar Layout Menu
bind = $mainMod CTRL, H, exec, pkill -SIGUSR1 waybar # Hide Waybar (moved from Super+H to Super+Ctrl+H)
bind = $mainMod SHIFT, E, exec, wezterm start yazi # Yazi File Manager

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume.sh --inc
bindel = ,XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume.sh --dec
bindel = ,XF86AudioMute, exec, ~/.config/hypr/scripts/volume.sh --toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness.sh --inc
bindel = ,XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh --dec

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
