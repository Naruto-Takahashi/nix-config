# APPLIACTIONS BLUR
windowrulev2 = noblur, tag:multimedia_video*
windowrulev2 = opacity 1.0, tag:multimedia_video*
windowrulev2 = opacity 0.8, tag:settings*
windowrulev2 = opacity 0.8, class:^(org.gnome.Nautilus)$
windowrulev2 = opacity 0.9, class:^(gedit|org.gnome.TextEditor|mousepad)$
windowrulev2 = opacity 0.9, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = opacity 0.9, class:^(kitty)$
windowrulev2 = opacity 0.85 override 0.7 override 1 override, class:^(discord|vesktop|org.telegram.desktop)$
windowrulev2 = opacity 0.8 override 0.6 override 1 override, class:^(Spotify)$
windowrulev2 = opacity 0.9 override 0.7 override 1 override, class:^(zen)$

# LAYER RULES
layerrule = blur, waybar
layerrule = ignorealpha 0.5, waybar
layerrule = ignorealpha 0.5, tag:notif*
layerrule = blur, logout_dialog

# SWAYNC BLUR & XRAY
layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorezero, swaync-control-center
layerrule = ignorezero, swaync-notification-window
layerrule = ignorealpha 0.5, swaync-control-center
layerrule = ignorealpha 0.5, swaync-notification-window
layerrule = xray 0, swaync-control-center
layerrule = xray 0, swaync-notification-window

#FLOAT
windowrulev2 = float, tag:settings*
windowrulev2 = float, tag:viewer*
windowrulev2 = float, tag:multimedia_video*
windowrulev2 = size 900 506, tag:multimedia_video*
windowrulev2 = float, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = size 50% 60%, class:^(org.pulseaudio.pavucontrol)$

# Ignore maximize requests from apps. You'll probably like this.
windowrulev2 = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# POP UPS AND DIALOGUES
windowrulev2 = float, title:^(Save As|Save a File|Pick Files)$
windowrulev2 = size 50% 60%, title:^(Save As|Save a File|Pick Files)$
windowrulev2 = center, title:^(Save As|Save a File|Pick Files)$

windowrulev2 = float, initialTitle:(Open Files)
windowrulev2 = size 70% 60%, initialTitle:(Open Files)
